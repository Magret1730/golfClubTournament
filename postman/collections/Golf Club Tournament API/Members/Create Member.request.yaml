$kind: http-request
name: Create Member
method: POST
url: '{{baseUrl}}/members'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "address": "123 Golf Lane",
      "email": "john.doe@example.com",
      "membershipType": "Premium",
      "phoneNumber": "555-1234",
      "membershipStartDate": "2024-01-01",
      "membershipDuration": "12 months"
    }
